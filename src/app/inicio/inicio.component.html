<!-- NAVBAR COMPLETA -->
<nav class="barra-navegacion">

 <!-- LOGO + BIENVENIDO -->
  <div class="nav-logo">
    <span *ngIf="usuarioActual$ | async as user; else noUser">
      Bienvenido, {{ user.nombreUsuario }}!
    </span>
    <ng-template #noUser>
      Red Social
    </ng-template>
  </div>
  <!-- BOTÓN HAMBURGUESA -->
  <button class="menu-toggle" (click)="menuAbierto = !menuAbierto">
    ☰
  </button>

  <!-- CONTENIDO -->
  <div class="nav-contenido" [class.activo]="menuAbierto">

    <!-- LINKS -->
    <div class="nav-izquierda">
      <a routerLink="/inicio" routerLinkActive="activo">Inicio</a>
      <a routerLink="new-post" routerLinkActive="activo">Mis publicaciones</a>
    </div>

    <!-- BOTONES DERECHA (lo que ya tenías, pero movido) -->
    <div class="nav-derecha" *ngIf="!isLoggedIn()">
      <button class="boton boton-login" (click)="showLogin = true">
        Iniciar sesión
      </button>
      <button class="boton boton-registro" (click)="showRegister = true">
        Registrarse
      </button>
    </div>

    <div class="nav-derecha" *ngIf="isLoggedIn()">
      <button class="boton boton-logout" (click)="logout()">
        Cerrar sesión
      </button>
    </div>

  </div>

</nav>

<!-- TU ROUTER (INTACTO) -->
<router-outlet></router-outlet>

<!-- ================= MODALES (INTACTOS) ================= -->

<!-- MODAL LOGIN -->
<div class="modal-fondo" *ngIf="showLogin" (click)="closeModals()">
  <div class="modal-contenido" (click)="$event.stopPropagation()">
    
    <button class="boton-cerrar" (click)="closeModals()">×</button>

    <h2 class="titulo-modal">Iniciar sesión</h2>

    <label>Usuario</label>
    <input type="text" [(ngModel)]="loginUsuario" placeholder="Ingrese su usuario">

    <label>Contraseña</label>
    <input type="password" [(ngModel)]="loginPassword" placeholder="Ingrese su contraseña">

    <button class="boton boton-primario" (click)="login()">
      Ingresar
    </button>
  </div>
</div>

<!-- MODAL REGISTRO -->
<div class="modal-fondo" *ngIf="showRegister" (click)="closeModals()">
  <div class="modal-contenido" (click)="$event.stopPropagation()">

    <button class="boton-cerrar" (click)="closeModals()">×</button>

    <h2 class="titulo-modal">Crear cuenta</h2>

    <label>Usuario</label>
    <input type="text" [(ngModel)]="registerUsuario" placeholder="Elija un usuario">

    <label>Email</label>
    <input type="email" [(ngModel)]="registerEmail" placeholder="Ingrese su email">

    <label>Contraseña</label>
    <input type="password" [(ngModel)]="registerPassword" placeholder="Cree una contraseña">

    <button class="boton boton-secundario" (click)="register()">
      Registrarse
    </button>
  </div>
</div>
