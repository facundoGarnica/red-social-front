<div class="feed-container">
  
  <div class="post" *ngFor="let post of posts">

  
    <div class="post-header">
      <img class="avatar" [src]="post.avatar" alt="avatar">
      <div class="user-info">
        <h4>{{ post.usuario }}</h4>
        <span>{{ post.fecha }}</span>
      </div>
    </div>


    <div class="post-content">
      <p>{{ post.texto }}</p>
      <img *ngIf="post.imagen" [src]="post.imagen" class="post-image">
    </div>

    <div class="post-actions">
      <button (click)="toggleLike(post)">
        👍 {{ post.likes }}
      </button>
      <button (click)="post.showComments = !post.showComments">
        💬 Comentarios
      </button>
    </div>

   
    <div class="comments" *ngIf="post.showComments">

      <div class="comment" *ngFor="let comment of post.comentarios">
        <strong>{{ comment.usuario }}:</strong> {{ comment.texto }}
      </div>
|

      <div class="add-comment">
        <input [(ngModel)]="post.nuevoComentario" placeholder="Escribe un comentario...">
        <button (click)="agregarComentario(post)">Enviar</button>
      </div>

    </div>

  </div>

</div>
